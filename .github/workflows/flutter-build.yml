name: Build & Release Mobile App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mkdir -p build/out
          cp build/app/outputs/flutter-apk/app-release.apk \
             build/out/ciks-coffee-mobile.apk

      - name: Delete previous latest release (overwrite)
        env:
          GH_TOKEN: ${{ secrets.FLUTTER_TOKEN }}
        run: |
          gh release delete latest --cleanup-tag -y || true

      - name: Create latest release & upload APK
        env:
          GH_TOKEN: ${{ secrets.FLUTTER_TOKEN }}
        run: |
          gh release create latest \
            --title "Ciks Coffee Mobile (Latest)" \
            --notes "Build otomatis dari branch main.

          Commit: ${{ github.sha }}
          Waktu:   ${{ github.run_id }}

          Unduh file \`ciks-coffee-mobile.apk\` lalu instal di perangkat Android (aktifkan *Install from unknown sources*)." \
            --target ${{ github.sha }} \
            build/out/ciks-coffee-mobile.apk